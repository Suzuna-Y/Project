<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>クイズ生成</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <h1>資料を読み込み問題生成・解説を行うシステム</h1>

    <!-- ファイルアップロードフォーム -->
    <form method="POST" enctype="multipart/form-data">
        <input
            type="file"
            id="fileInput"
            name="file"
            accept=".pdf,.pptx,.ppt"
            required
        >

        <!-- ファイル選択ボタン -->
        <label for="fileInput" class="custom-btn">ファイルを選択</label>

        <!-- 選択ファイル名表示 -->
        <div class="file-display-box" id="fileNameBox">
            ファイルが選択されていません
        </div>

        <!-- 送信ボタン -->
        <button type="submit" class="custom-btn2">
            問題を生成する
        </button>
    </form>

    <!-- 次ページへ（必要なら使用）-->
    <button id="nextpage" class="custom-btn2" style="display:none;">
        次のページへ
    </button>
    <!-- ローディング画面 -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p>問題を生成中です。しばらくお待ちください…</p>
    </div>

     <script>
        const fileInput = document.getElementById('fileInput');
        const fileNameBox = document.getElementById('fileNameBox');
        const loadingOverlay = document.getElementById('loading-overlay');
        const form = document.querySelector('form');

        // ファイルを選択したら名前を表示
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                fileNameBox.textContent = fileInput.files[0].name;
            } else {
                fileNameBox.textContent = "ファイルが選択されていません";
            }
        });

        // フォーム送信時にローディング表示
        form.addEventListener('submit', () => {
            loadingOverlay.style.display = 'flex';
        });
    </script>
    

</body>
</html>
